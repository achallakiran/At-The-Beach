<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>At the Beach</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; }
        
        /* UI Styling */
        #ui-overlay {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
        }

        #stanza-box {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #333;
            padding: 15px 30px;
            width: 80%;
            max-width: 600px;
            border-radius: 10px;
            text-align: center;
            /* Copperplate Font requested */
            font-family: "Copperplate", "Copperplate Gothic Light", serif;
            font-size: 1.3rem;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
            display: none;
            pointer-events: auto;
        }

        #start-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 50px;
            font-family: "Copperplate", serif;
            font-size: 1.5rem;
            background: #FFD700;
            border: 5px solid #333;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 8px 0 #b8860b;
        }
        #start-button:active { transform: translate(-50%, -46%); box-shadow: 0 4px 0 #b8860b; }
    </style>
</head>
<body>

    <button id="start-button" onclick="beginExperience()">ENTER THE BEACH</button>

    <div id="ui-overlay">
        <div id="stanza-box">
            <div id="poem-content"></div>
        </div>
    </div>

<script>
let worldWidth = 5000;
let camX = 0;
let targetCamX = 0;
let isTour = false;
let tourIndex = 0;
let hasStarted = false;
let splashes = [];
let jumps = { p1: 0, p2: 0, p3: 0, p4: 0, boat: 0 };

const stanzas = [
    { text: "At the beach, a wonderful day,\neveryone goes out to play.", x: 500 },
    { text: "Some people are on the shore...", x: 1200 },
    { text: "In the sea are even more!", x: 1900 },
    { text: "A small island lies nicely...", x: 2800 },
    { text: "A boy and a girl wave hi and bye!", x: 3500 },
    { text: "On two floaties, two girls float...", x: 4100 },
    { text: "And a little boy is riding on a boat.", x: 4700 },
    { text: "So very brightly shines the sun,\nAll of them are having fun!", x: 500 }
];

function setup() {
    createCanvas(windowWidth, windowHeight);
}

function beginExperience() {
    hasStarted = true;
    isTour = true;
    document.getElementById('start-button').style.display = 'none';
    runTour();
}

function runTour() {
    if (tourIndex < stanzas.length) {
        targetCamX = stanzas[tourIndex].x - width/2;
        updateText(stanzas[tourIndex].text);
        setTimeout(() => {
            tourIndex++;
            runTour();
        }, 5000);
    } else {
        isTour = false;
        updateText("Now explore the beach yourself!");
        setTimeout(() => document.getElementById('stanza-box').style.display = 'none', 3000);
    }
}

function updateText(msg) {
    const box = document.getElementById('stanza-box');
    const content = document.getElementById('poem-content');
    box.style.display = 'block';
    content.innerText = msg;
}

function draw() {
    background('#87CEEB'); // Ensure background is always drawn first

    if (!hasStarted) {
        // Simple preview logic
        drawScene(0);
        return;
    }

    // Camera movement
    if (isTour) {
        camX = lerp(camX, targetCamX, 0.05);
    } else if (mouseIsPressed) {
        camX -= (mouseX - pmouseX);
    }
    camX = constrain(camX, 0, worldWidth - width);

    drawScene(camX);
}

function drawScene(offset) {
    // 1. Sky Elements (Parallax)
    push();
    translate(-offset * 0.2, 0);
    drawSun(width * 0.5, 120);
    drawBird(800, 150);
    drawBird(2500, 100);
    pop();

    // 2. The Main World
    push();
    translate(-offset, 0);
    
    // Sand and Water
    noStroke();
    fill('#1E90FF'); rect(0, height * 0.6, worldWidth, height * 0.4);
    fill('#EDC9AF'); rect(0, height * 0.8, worldWidth, height * 0.2);
    
    stroke('#333'); strokeWeight(8);
    line(0, height * 0.6, worldWidth, height * 0.6);
    line(0, height * 0.8, worldWidth, height * 0.8);

    // Characters & Assets
    drawSign(500, height * 0.8);
    drawPerson(1200, height * 0.85 - jumps.p1, "#FF6B6B"); 
    drawPerson(1900, height * 0.7 - jumps.p2, "#4ECDC4"); 
    drawIsland(2800, height * 0.6);
    drawPerson(3450, height * 0.85 - jumps.p3, "#FF9F43", true); 
    drawPerson(3550, height * 0.85 - jumps.p3, "#A29BFE", true);
    drawFloatie(4100, height * 0.7 - jumps.p4, "#FD79A8");
    drawBoat(4700, height * 0.65 - jumps.boat);

    // Physics
    for (let key in jumps) jumps[key] *= 0.8;
    for (let s of splashes) { s.display(); s.update(); }
    pop();
}

function drawSign(x, y) {
    stroke('#333'); fill('#8B4513'); rect(x-5, y-100, 10, 100);
    fill('#FFF'); rect(x-100, y-160, 200, 70, 5);
    fill('#333'); noStroke(); textAlign(CENTER); 
    textFont("Copperplate", "serif"); textSize(22);
    text("AT THE BEACH", x, y-115);
}

function drawSun(x, y) {
    push(); translate(x, y); fill('#FFD700'); stroke('#333');
    ellipse(0, 0, 100, 100);
    for(let i=0; i<12; i++) { rotate(PI/6); line(65, 0, 85, 0); }
    pop();
}

function drawBird(x, y) {
    push();
    let xPos = (frameCount + x) % (worldWidth);
    translate(xPos, y + sin(frameCount*0.05)*15);
    stroke('#333'); noFill(); strokeWeight(3);
    arc(-10, 0, 20, 20, PI, TWO_PI); arc(10, 0, 20, 20, PI, TWO_PI);
    pop();
}

function drawIsland(x, y) {
    fill('#FFE4B5'); stroke('#333'); arc(x, y, 500, 180, PI, 0);
    fill('#8B4513'); rect(x-10, y-90, 20, 90);
    fill('#2E8B57'); ellipse(x, y-100, 120, 40);
}

function drawPerson(x, y, col, waving=false) {
    push(); translate(x, y); fill(col); stroke('#333'); strokeWeight(5);
    rect(-15, -50, 30, 50, 5); fill('#FFE4C4'); ellipse(0, -70, 40, 40);
    if(waving) {
        push(); translate(15, -40); rotate(sin(frameCount*0.2));
        line(0, 0, 30, -30); pop();
    }
    pop();
}

function drawFloatie(x, y, col) {
    push(); translate(x, y + sin(frameCount*0.05)*10);
    fill(col); stroke('#333'); ellipse(0, 0, 110, 40);
    drawPerson(0, -5, "#FFF"); pop();
}

function drawBoat(x, y) {
    push(); translate(x, y + sin(frameCount*0.03)*12);
    fill('#FFF'); stroke('#333'); quad(-90, 0, 90, 0, 60, 50, -60, 50);
    fill('#FF6B6B'); triangle(0, -5, 0, -110, 70, -5);
    drawPerson(0, 15, "#333", true); pop();
}

function mousePressed() {
    if(!hasStarted || isTour) return;
    let mx = mouseX + camX;
    if(dist(mx, mouseY, 1200, height*0.85) < 80) jumps.p1 = 60;
    if(dist(mx, mouseY, 4700, height*0.65) < 120) jumps.boat = 60;
    if(mouseY > height * 0.6) splashes.push(new Splash(mx, mouseY));
}

class Splash {
    constructor(x, y) { this.x = x; this.y = y; this.r = 5; this.alpha = 255; }
    update() { this.r += 3; this.alpha -= 10; }
    display() { noFill(); stroke(255, this.alpha); ellipse(this.x, this.y, this.r, this.r/3); }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
