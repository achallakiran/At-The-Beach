<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>At the Beach - Fixed Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #87CEEB; 
            font-family: "Comic Sans MS", "Comic Sans", cursive; 
        }
        #ui-layer {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; z-index: 100; pointer-events: none;
        }
        .stanza-box {
            background: white; border: 4px solid #333; padding: 15px 40px;
            width: 80%; max-width: 500px; border-radius: 20px;
            font-size: 1.2rem; text-align: center;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.1);
            position: relative; pointer-events: auto;
            display: none; opacity: 0; transition: opacity 0.5s ease;
        }
        #start-screen {
            position: fixed; inset: 0; background: #87CEEB;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
        button.main-btn {
            padding: 15px 40px; font-size: 1.5rem; background: #FFD700;
            border: 4px solid #333; border-radius: 30px; cursor: pointer; font-family: inherit;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="font-size: 3rem; margin: 0;">At the Beach</h1>
        <p>By Your Daughter</p>
        <button class="main-btn" onclick="initScene()">ENTER THE BEACH</button>
    </div>

    <div id="ui-layer">
        <div id="text-display" class="stanza-box">
            <span id="poem-text"></span>
        </div>
    </div>

<script>
let worldWidth = 5000;
let camX = 0;
let targetCamX = 0;
let isTour = false;
let tourIndex = 0;
let splashes = [];
let jumps = { p1: 0, p2: 0, p3: 0, p4: 0, boat: 0 };
let osc;

// Updated coordinates to ensure visibility
let stanzas = [
    { text: "At the beach, a wonderful day,\neveryone goes out to play.", x: 500 },
    { text: "Some people are on the shore...", x: 1200 },
    { text: "In the sea are even more!", x: 1900 },
    { text: "A small island lies nicely...", x: 2800 },
    { text: "A boy and a girl wave hi and bye!", x: 3500 },
    { text: "On two floaties, two girls float...", x: 4100 },
    { text: "And a little boy is riding on a boat.", x: 4600 },
    { text: "So very brightly shines the sun,\nAll of them are having fun!", x: 500 }
];

function setup() {
    createCanvas(windowWidth, windowHeight);
    osc = new p5.Oscillator('sine');
    camX = 0; // Start at the beginning
}

function initScene() {
    document.getElementById('start-screen').style.display = 'none';
    isTour = true;
    startTourStep();
}

function startTourStep() {
    if (tourIndex < stanzas.length) {
        // Calculate target so the character is centered
        targetCamX = stanzas[tourIndex].x - width/2;
        showStanza(stanzas[tourIndex].text);
        setTimeout(() => { tourIndex++; startTourStep(); }, 5000);
    } else {
        isTour = false;
    }
}

function showStanza(txt) {
    const box = document.getElementById('text-display');
    document.getElementById('poem-text').innerText = txt;
    box.style.display = 'block';
    box.style.opacity = '1';
    setTimeout(() => { box.style.opacity = '0'; }, 4000);
}

function draw() {
    background('#87CEEB');

    // Camera movement
    if (isTour) {
        camX = lerp(camX, targetCamX, 0.05);
    } else if (mouseIsPressed) {
        camX -= (mouseX - pmouseX);
    }
    camX = constrain(camX, 0, worldWidth - width);

    // 1. Distant Parallax
    push();
    translate(-camX * 0.2, 0);
    drawSun(width * 0.3, 150);
    drawBird(800, 100);
    drawBird(2000, 150);
    pop();

    // 2. Main World
    push();
    translate(-camX, 0);
    
    // Water & Sand
    noStroke();
    fill('#1E90FF'); rect(0, height * 0.65, worldWidth, height * 0.35);
    fill('#EDC9AF'); rect(0, height * 0.85, worldWidth, height * 0.15);
    stroke('#333'); strokeWeight(6);
    line(0, height*0.65, worldWidth, height*0.65);
    line(0, height*0.85, worldWidth, height*0.85);

    // Scene Elements
    drawSign(500, height * 0.85); // Title Sign
    drawPerson(1200, height * 0.9 - jumps.p1, "#FF6B6B"); 
    drawPerson(1900, height * 0.75 - jumps.p2, "#4ECDC4"); 
    drawIsland(2800, height * 0.65);
    drawPerson(3450, height * 0.9 - jumps.p3, "#FF9F43", true); 
    drawPerson(3550, height * 0.9 - jumps.p3, "#A29BFE", true);
    drawFloatie(4100, height * 0.75 - jumps.p4, "#FD79A8");
    drawBoat(4600, height * 0.7 - jumps.boat);

    // Animation physics
    for (let key in jumps) { jumps[key] *= 0.85; }
    for (let s of splashes) { s.display(); s.update(); }
    pop();
}

function drawSign(x, y) {
    stroke('#333'); fill('#8B4513'); rect(x-5, y-80, 10, 80);
    fill('#FFF'); rect(x-80, y-130, 160, 60, 5);
    fill('#333'); noStroke(); textAlign(CENTER); textSize(18);
    text("AT THE BEACH", x, y-95);
}

function drawSun(x, y) {
    push(); translate(x, y); fill('#FFD700'); stroke('#333');
    ellipse(0, 0, 80, 80);
    for(let i=0; i<8; i++) { rotate(PI/4); line(50, 0, 65, 0); }
    pop();
}

function drawBird(x, y) {
    push();
    let xPos = (frameCount + x) % (worldWidth);
    translate(xPos, y + sin(frameCount*0.05)*10);
    stroke('#333'); noFill(); strokeWeight(2);
    line(-10, 5, 0, 0); line(0, 0, 10, 5);
    pop();
}

function drawIsland(x, y) {
    fill('#FFE4B5'); stroke('#333'); arc(x, y, 400, 120, PI, 0);
    fill('#8B4513'); rect(x-8, y-70, 16, 70);
    fill('#2E8B57'); ellipse(x, y-80, 100, 30);
}

function drawPerson(x, y, col, waving=false) {
    push(); translate(x, y); fill(col); stroke('#333'); strokeWeight(4);
    rect(-12, -40, 24, 40, 4); fill('#FFE4C4'); ellipse(0, -55, 30, 30);
    if(waving) { line(12, -30, 25 + sin(frameCount*0.1)*10, -50); }
    pop();
}

function drawFloatie(x, y, col) {
    push(); translate(x, y + sin(frameCount*0.05)*5);
    fill(col); ellipse(0, 0, 90, 35);
    drawPerson(0, -5, "#FFF"); pop();
}

function drawBoat(x, y) {
    push(); translate(x, y + sin(frameCount*0.03)*8);
    fill('#FFF'); quad(-70, 0, 70, 0, 50, 40, -50, 40);
    fill('#FF6B6B'); triangle(0, -5, 0, -90, 50, -5);
    drawPerson(0, 5, "#333", true); pop();
}

function mousePressed() {
    if(isTour) return;
    let mx = mouseX + camX;
    if(dist(mx, mouseY, 1200, height*0.9) < 60) jumps.p1 = 50;
    if(dist(mx, mouseY, 1900, height*0.75) < 60) jumps.p2 = 50;
    if(dist(mx, mouseY, 4600, height*0.7) < 100) jumps.boat = 50;
    if(mouseY > height * 0.65) splashes.push(new Splash(mx, mouseY));
}

class Splash {
    constructor(x, y) { this.x = x; this.y = y; this.r = 5; this.alpha = 255; }
    update() { this.r += 2; this.alpha -= 5; }
    display() { noFill(); stroke(255, this.alpha); ellipse(this.x, this.y, this.r, this.r/3); }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
