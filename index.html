<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>At the Beach - Stable Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; }
        #ui-overlay {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; z-index: 1000; pointer-events: none;
        }
        #stanza-box {
            background: rgba(255, 255, 255, 0.98);
            border: 4px solid #333;
            padding: 15px 30px;
            width: 85%; max-width: 600px;
            border-radius: 12px;
            text-align: center;
            font-family: "Copperplate", "Copperplate Gothic Light", serif;
            font-size: 1.2rem;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.15);
            display: none;
            pointer-events: auto;
        }
        #start-button {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 25px 60px;
            font-family: "Copperplate", serif;
            font-size: 1.8rem;
            background: #FFD700;
            border: 6px solid #333;
            cursor: pointer;
            z-index: 2000;
            border-radius: 50px;
            box-shadow: 0 10px 0 #b8860b;
        }
    </style>
</head>
<body>

    <button id="start-button" onclick="beginExperience()">ENTER THE BEACH</button>

    <div id="ui-overlay">
        <div id="stanza-box">
            <div id="poem-content"></div>
        </div>
    </div>

<script>
let worldWidth = 5500;
let camX = 0;
let targetCamX = 0;
let isTour = false;
let tourIndex = 0;
let hasStarted = false;
let splashes = [];
let anims = { p1: 0, p2: 0, p3: 0, p4: 0, boat: 0 };
let osc, noise, filter;

// This ensures the beach is always at the 60% mark of YOUR screen
function getHorizon() { return height * 0.6; }

const stanzas = [
    { text: "At the beach, a wonderful day,\neveryone goes out to play.", x: 600 },
    { text: "Some people are on the shore...", x: 1400 },
    { text: "In the sea are even more!", x: 2200 },
    { text: "A small island lies nicely...", x: 3100 },
    { text: "A boy and a girl wave hi and bye!", x: 3800 },
    { text: "On two floaties, two girls float...", x: 4400 },
    { text: "And a little boy is riding on a boat.", x: 5000 },
    { text: "So very brightly shines the sun,\nAll of them are having fun!", x: 600 }
];

function setup() {
    createCanvas(windowWidth, windowHeight);
    
    // Audio initialization
    osc = new p5.Oscillator('sine');
    noise = new p5.Noise('pink');
    filter = new p5.LowPass();
    noise.disconnect();
    noise.connect(filter);
}

function beginExperience() {
    hasStarted = true;
    isTour = true;
    document.getElementById('start-button').style.display = 'none';
    
    // Resume Audio Context for browsers
    if (getAudioContext().state !== 'running') {
        getAudioContext().resume();
    }
    
    noise.start(); 
    noise.amp(0.05, 1);
    
    runTour();
}

function runTour() {
    if (tourIndex < stanzas.length) {
        // Center the character on screen
        targetCamX = stanzas[tourIndex].x - width/2;
        updateText(stanzas[tourIndex].text);
        setTimeout(() => {
            tourIndex++;
            runTour();
        }, 5000);
    } else {
        isTour = false;
        updateText("The beach is yours to explore!");
        setTimeout(() => {
            document.getElementById('stanza-box').style.display = 'none';
        }, 3000);
    }
}

function updateText(msg) {
    const box = document.getElementById('stanza-box');
    const content = document.getElementById('poem-content');
    box.style.display = 'block';
    content.innerText = msg;
}

function draw() {
    background('#87CEEB');
    let h = getHorizon();

    // If we haven't started, show a static preview of the start
    if (!hasStarted) {
        drawScene(0, h);
        return;
    }

    // Smooth camera movement
    if (isTour) {
        camX = lerp(camX, targetCamX, 0.04);
    } else if (mouseIsPressed) {
        camX -= (mouseX - pmouseX);
    }
    camX = constrain(camX, 0, worldWidth - width);

    // Dynamic Sound
    filter.freq(map(sin(frameCount * 0.02), -1, 1, 200, 700));

    drawScene(camX, h);
}

function drawScene(offset, h) {
    // 1. Mountains (Very slow parallax)
    push();
    translate(-offset * 0.1, 0);
    fill('#6AB2D5'); noStroke();
    for (let i = 0; i < 8; i++) {
        triangle(i*800, h, i*800+400, h-150, i*800+800, h);
    }
    pop();

    // 2. Clouds & Sun (Medium parallax)
    push();
    translate(-offset * 0.25, 0);
    drawSun(width * 0.5, 100);
    drawCloud(400, 120);
    drawCloud(1800, 150);
    drawCloud(3200, 100);
    pop();

    // 3. Main Action Layer
    push();
    translate(-offset, 0);
    
    // The Sea
    noStroke(); fill('#1E90FF');
    rect(0, h, worldWidth, height - h);
    
    // The Sand
    fill('#EDC9AF');
    rect(0, h + 150, worldWidth, height - (h + 150));
    
    // Outlines
    stroke('#333'); strokeWeight(8);
    line(0, h, worldWidth, h);
    line(0, h + 150, worldWidth, h + 150);

    // Interactive Elements
    drawSign(600, h + 150);
    drawPerson(1400, h + 180, "#FF6B6B", false, anims.p1); 
    drawPerson(2200, h + 80, "#4ECDC4", false, anims.p2); 
    drawIsland(3100, h);
    drawPerson(3750, h + 180, "#FF9F43", true, anims.p3); 
    drawPerson(3850, h + 180, "#A29BFE", true, anims.p3);
    drawFloatie(4400, h + 60, "#FD79A8", anims.p4);
    drawBoat(5000, h + 40, anims.boat);

    // Animate toggles back to rest
    for (let key in anims) anims[key] = lerp(anims[key], 0, 0.1);
    
    // Splashes
    for (let i = splashes.length - 1; i >= 0; i--) {
        splashes[i].display();
        splashes[i].update();
        if (splashes[i].alpha <= 0) splashes.splice(i, 1);
    }
    pop();
}

// Drawing Components
function drawSun(x, y) {
    push(); translate(x, y); fill('#FFD700'); stroke('#333'); strokeWeight(5);
    ellipse(0, 0, 100, 100);
    for(let i=0; i<12; i++) { rotate(PI/6); line(60, 0, 80, 0); }
    pop();
}

function drawCloud(x, y) {
    push(); translate(x, y); fill(255); stroke('#333'); strokeWeight(4);
    ellipse(0, 0, 80, 50); ellipse(30, -10, 70, 50); ellipse(-30, -10, 70, 50);
    pop();
}

function drawSign(x, y) {
    stroke('#333'); fill('#8B4513'); rect(x-5, y-80, 10, 80);
    fill('#FFF'); rect(x-100, y-140, 200, 60, 5);
    fill('#333'); noStroke(); textAlign(CENTER); textSize(20);
    textFont("Copperplate"); text("AT THE BEACH", x, y-100);
}

function drawIsland(x, y) {
    fill('#FFE4B5'); stroke('#333'); arc(x, y, 400, 150, PI, 0);
    fill('#8B4513'); rect(x-8, y-70, 16, 70);
    fill('#2E8B57'); ellipse(x, y-80, 110, 40);
}

function drawPerson(x, y, col, waving, a) {
    push(); translate(x, y);
    scale(1 - sin(a*PI)*0.1, 1 + sin(a*PI)*0.2);
    fill(col); stroke('#333'); strokeWeight(5);
    rect(-15, -50, 30, 50, 5); fill('#FFE4C4'); ellipse(0, -70, 40, 40);
    if(waving || a > 0.1) line(15, -40, 35, -40 - sin(frameCount*0.2)*15);
    pop();
}

function drawFloatie(x, y, col, a) {
    push(); translate(x, y + sin(frameCount*0.05)*8);
    scale(1 + sin(a*PI)*0.1); fill(col); stroke('#333'); ellipse(0, 0, 110, 40);
    drawPerson(0, -5, "#FFF", false, 0); pop();
}

function drawBoat(x, y, a) {
    push(); translate(x, y + sin(frameCount*0.03)*10);
    rotate(sin(a*PI)*0.1); fill('#FFF'); stroke('#333'); strokeWeight(6);
    quad(-90, 0, 90, 0, 60, 50, -60, 50);
    fill('#FF6B6B'); triangle(0, -5, 0, -110, 75, -5);
    pop();
}

function mousePressed() {
    if(!hasStarted || isTour) return;
    let mx = mouseX + camX;
    let h = getHorizon();
    
    osc.start(); osc.amp(0.1, 0.05); osc.amp(0, 0.2);
    if(dist(mx, mouseY, 1400, h+180) < 80) { anims.p1 = 1; osc.freq(400); }
    if(dist(mx, mouseY, 5000, h+40) < 150) { anims.boat = 1; osc.freq(300); }
    if(mouseY > h) { splashes.push(new Splash(mx, mouseY)); osc.freq(200); }
}

class Splash {
    constructor(x, y) { this.x = x; this.y = y; this.r = 5; this.alpha = 255; }
    update() { this.r += 3; this.alpha -= 10; }
    display() { noFill(); stroke(255, this.alpha); ellipse(this.x, this.y, this.r, this.r/3); }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
